

[mcu]
serial: 
restart_method: command

[printer]
kinematics: cartesian
max_velocity: 200
max_accel: 1500
max_z_velocity: 200
max_z_accel: 1000

[thermistor NTC10K_B3950]
temperature1: 25
resistance1: 10000
beta: 3950

# X axis (motor_0)
[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PG6
position_endstop: 35
position_min: 35
position_max: 625
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC4
run_current: 0.650  
stealthchop_threshold: 999999

# Y dual (motor_2 -> motor_2_1 + motor_2_2)
[stepper_y]
step_pin: PF11
dir_pin: PG3
enable_pin: !PG5
microsteps: 16
rotation_distance: 40
endstop_pin: ^!PG9
position_endstop: 0
position_max: 200
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC6
run_current: 0.650
stealthchop_threshold: 999999

# Z lead screw (motor_1)
[stepper_z]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 1
endstop_pin: ^!PG10
position_endstop: 0.0
position_max: 90
homing_speed: 25

[tmc2209 stepper_z]
uart_pin: PD11
run_current: 0.650
stealthchop_threshold: 999999

# Nozzle spacing (motor_3, NEMA 14)
[manual_stepper nozzle_spacing]
step_pin: PG4
dir_pin: PC1
enable_pin: !PA0
microsteps: 16
rotation_distance: 3.5
velocity: 30
accel: 200
endstop_pin: ^PG12

[tmc2209 manual_stepper nozzle_spacing]
uart_pin: PC7
run_current: 0.500
stealthchop_threshold: 999999

# Pump 1 (motor_4)
[manual_stepper pump1]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 16
rotation_distance: 315
velocity: 50
accel: 460

[tmc2209 manual_stepper pump1]
uart_pin: PF2
run_current: 1.000
stealthchop_threshold: 999999

# Pump 2 (motor_5)
[manual_stepper pump2]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
microsteps: 16
rotation_distance: 330
velocity: 50
accel: 1000

[tmc2209 manual_stepper pump2]
uart_pin: PE4
run_current: 1.000
stealthchop_threshold: 999999

# Pump 3 (motor_6)
[manual_stepper pump3]
step_pin: PE2
dir_pin: !PE3
enable_pin: !PD4
microsteps: 16
rotation_distance: 330
velocity: 50
accel: 1000

[tmc2209 manual_stepper pump3]
uart_pin: PE1
run_current: 1.000
stealthchop_threshold: 999999

# Pad heater (HB)
[heater_generic heatingPad]
heater_pin: PA1
sensor_type: NTC10K_B3950
sensor_pin: PF3
pullup_resistor: 4700
control: pid
pid_Kp: 50
pid_Ki: 5
pid_Kd: 100
min_temp: 0
max_temp: 100
max_power: 1.0

[verify_heater heatingPad]
max_error: 999
heating_gain: 0.1
check_gain_time: 60

# Wire heater (HE0)
[heater_generic heatingWire]
heater_pin: PA2
sensor_type: NTC10K_B3950
sensor_pin: PF4
pullup_resistor: 4700
control: pid
pid_Kp: 50
pid_Ki: 5
pid_Kd: 100
min_temp: 0
max_temp: 100
max_power: 0.25

[verify_heater heatingWire]
max_error: 999
heating_gain: 0.1
check_gain_time: 60

# ANSI/SLAS plate presets: 6=39.12mm, 12=26.00mm, 24=19.30mm, 96=9.00mm

[gcode_macro homeAll]
gcode:
    G28
    homeNozzles

[gcode_macro homeXY]
description: Home X and Y only (skip Z) plus nozzle spacing
gcode:
    G28 X Y
    homeNozzles

[gcode_macro moveTo]
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set f = params.F|default(6000)|float %}
    G90
    G1 X{x} Y{y} F{f}

[gcode_macro homeNozzles]
description: Home the nozzle-spacing axis
gcode:
    MANUAL_STEPPER STEPPER=nozzle_spacing ENABLE=1
    MANUAL_STEPPER STEPPER=nozzle_spacing SET_POSITION=0
    MANUAL_STEPPER STEPPER=nozzle_spacing MOVE=-50 STOP_ON_ENDSTOP=1 SPEED=10
    MANUAL_STEPPER STEPPER=nozzle_spacing SET_POSITION=0
    SET_GCODE_VARIABLE MACRO=setSpacing VARIABLE=current VALUE=0

[gcode_macro setSpacing]
description: Set nozzle spacing in mm. Use TARGET= for explicit, or PLATE=6|12|24|96.
# Cache: skip redundant moves. -1 = unknown (post-restart).
variable_current: -1.0
gcode:
    {% if params.PLATE %}
        {% set p = params.PLATE|int %}
        {% if p == 6 %}    {% set target = 39.12 %}
        {% elif p == 12 %} {% set target = 26.00 %}
        {% elif p == 24 %} {% set target = 19.30 %}
        {% elif p == 96 %} {% set target =  9.00 %}
        {% else %}
            {action_raise_error("PLATE must be 6, 12, 24, or 96")}
        {% endif %}
    {% else %}
        {% set target = params.TARGET|float %}
    {% endif %}
    {% set cur = printer["gcode_macro setSpacing"].current %}
    {% if cur < 0 or (target - cur)|abs > 0.05 %}
        MANUAL_STEPPER STEPPER=nozzle_spacing MOVE={target} SPEED=20
        SET_GCODE_VARIABLE MACRO=setSpacing VARIABLE=current VALUE={target}
    {% endif %}

[gcode_macro dispense]
gcode:
    {% set pump = params.PUMP|default(1)|int %}
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    MANUAL_STEPPER STEPPER=pump{pump} SET_POSITION=0
    MANUAL_STEPPER STEPPER=pump{pump} MOVE={vol} SPEED={sp}

[gcode_macro dispenseAll]
gcode:
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
    MANUAL_STEPPER STEPPER=pump2 SET_POSITION=0
    MANUAL_STEPPER STEPPER=pump3 SET_POSITION=0
    MANUAL_STEPPER STEPPER=pump1 MOVE={vol} SPEED={sp} SYNC=0
    MANUAL_STEPPER STEPPER=pump2 MOVE={vol} SPEED={sp} SYNC=0
    MANUAL_STEPPER STEPPER=pump3 MOVE={vol} SPEED={sp} SYNC=1

[gcode_macro reversePump]
gcode:
    {% set pump = params.PUMP|default(1)|int %}
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    MANUAL_STEPPER STEPPER=pump{pump} SET_POSITION=0
    MANUAL_STEPPER STEPPER=pump{pump} MOVE=-{vol} SPEED={sp}

[gcode_macro setHeat]
gcode:
    {% set zone = params.ZONE|default("PAD")|upper %}
    {% set t = params.TEMP|default(35)|float %}
    {% if zone == "PAD" %}
        SET_HEATER_TEMPERATURE HEATER=heatingPad TARGET={t}
    {% elif zone == "WIRE" %}
        SET_HEATER_TEMPERATURE HEATER=heatingWire TARGET={t}
    {% endif %}

[gcode_macro heatOff]
gcode:
    {% set zone = params.ZONE|default("ALL")|upper %}
    {% if zone == "PAD" or zone == "ALL" %}
        SET_HEATER_TEMPERATURE HEATER=heatingPad TARGET=0
    {% endif %}
    {% if zone == "WIRE" or zone == "ALL" %}
        SET_HEATER_TEMPERATURE HEATER=heatingWire TARGET=0
    {% endif %}

[gcode_macro fillDish]
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    {% set zd = params.Z_DISP|default(75)|float %}
    {% set zt = params.Z_TRAVEL|default(5)|float %}
    G90
    G1 Z{zt} F600
    G1 X{x} Y{y} F6000
    G1 Z{zd} F600
    dispense PUMP=1 VOLUME={vol} SPEED={sp}
    G1 Z{zt} F600

[gcode_macro fillWell]
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    {% set zd = params.Z_DISP|default(65)|float %}
    {% set zt = params.Z_TRAVEL|default(5)|float %}
    G90
    G1 Z{zt} F600
    G1 X{x} Y{y} F6000
    G1 Z{zd} F600
    dispense PUMP=1 VOLUME={vol} SPEED={sp}
    G1 Z{zt} F600

# 3-nozzle row fill. ORIENT=H: long axis (default). ORIENT=V: rotated 90 deg.
# Remainder of 1 or 2 wells handled with a partial dispense.
# Z drops to Z_DISP once at row start, lifts to Z_TRAVEL once at row end.
# Pass SKIP_Z=1 to bypass Z motion (used by fillPlate to keep Z down across rows).
[gcode_macro fillRow]
description: Fill one row of any plate using 3 nozzles + spacing axis
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set wells = params.WELLS|default(24)|int %}
    {% set orient = params.ORIENT|default("H")|upper %}
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    {% set zd = params.Z_DISP|default(70)|float %}
    {% set zt = params.Z_TRAVEL|default(5)|float %}
    {% set skipZ = params.SKIP_Z|default(0)|int %}
    {% set rev = params.REVERSE|default(50)|float %}
    {% set dly = params.DELAY|default(1000)|int %}
    {% if wells == 6 %}    {% set wH = 3 %}{% set wV = 2 %}{% set spacing = 39.12 %}
    {% elif wells == 12 %} {% set wH = 4 %}{% set wV = 3 %}{% set spacing = 26.00 %}
    {% elif wells == 24 %} {% set wH = 6 %}{% set wV = 4 %}{% set spacing = 19.30 %}
    {% elif wells == 96 %} {% set wH = 12 %}{% set wV = 8 %}{% set spacing = 9.00 %}
    {% else %}
        {action_raise_error("WELLS must be 6, 12, 24, or 96")}
    {% endif %}
    {% set cols = wH if orient == "H" else wV %}
    {% set dispVol = vol + rev %}
    G90
    {% if skipZ == 0 %}
        G1 Z{zt} F600
        G1 X{x} Y{y} F6000
        G1 Z{zd} F600
    {% else %}
        G1 X{x} Y{y} F6000
    {% endif %}
    {% set ns = namespace(curX = x) %}
    {% for chunk in range(cols // 3) %}
        G1 X{ns.curX} F6000
        MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
        MANUAL_STEPPER STEPPER=pump2 SET_POSITION=0
        MANUAL_STEPPER STEPPER=pump3 SET_POSITION=0
        MANUAL_STEPPER STEPPER=pump1 MOVE={dispVol} SPEED={sp} SYNC=0
        MANUAL_STEPPER STEPPER=pump2 MOVE={dispVol} SPEED={sp} SYNC=0
        MANUAL_STEPPER STEPPER=pump3 MOVE={dispVol} SPEED={sp} SYNC=1
        {% if rev > 0 %}
            MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
            MANUAL_STEPPER STEPPER=pump2 SET_POSITION=0
            MANUAL_STEPPER STEPPER=pump3 SET_POSITION=0
            MANUAL_STEPPER STEPPER=pump1 MOVE=-{rev} SPEED={sp} SYNC=0
            MANUAL_STEPPER STEPPER=pump2 MOVE=-{rev} SPEED={sp} SYNC=0
            MANUAL_STEPPER STEPPER=pump3 MOVE=-{rev} SPEED={sp} SYNC=1
        {% endif %}
        {% set ns.curX = ns.curX + 3 * spacing %}
    {% endfor %}
    {% if cols % 3 == 1 %}
        G1 X{ns.curX} F6000
        MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
        MANUAL_STEPPER STEPPER=pump1 MOVE={dispVol} SPEED={sp}
        {% if rev > 0 %}
            MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
            MANUAL_STEPPER STEPPER=pump1 MOVE=-{rev} SPEED={sp}
        {% endif %}
    {% elif cols % 3 == 2 %}
        G1 X{ns.curX} F6000
        MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
        MANUAL_STEPPER STEPPER=pump2 SET_POSITION=0
        MANUAL_STEPPER STEPPER=pump1 MOVE={dispVol} SPEED={sp} SYNC=0
        MANUAL_STEPPER STEPPER=pump2 MOVE={dispVol} SPEED={sp} SYNC=1
        {% if rev > 0 %}
            MANUAL_STEPPER STEPPER=pump1 SET_POSITION=0
            MANUAL_STEPPER STEPPER=pump2 SET_POSITION=0
            MANUAL_STEPPER STEPPER=pump1 MOVE=-{rev} SPEED={sp} SYNC=0
            MANUAL_STEPPER STEPPER=pump2 MOVE=-{rev} SPEED={sp} SYNC=1
        {% endif %}
    {% endif %}
    {% if dly > 0 %}
        G4 P{dly}
    {% endif %}
    {% if skipZ == 0 %}
        G1 Z{zt} F600
    {% endif %}

# fillPlate: setSpacing once, Z drops once at start, loop fillRow per row, Z lifts at end.
[gcode_macro fillPlate]
gcode:
    {% set x = params.X|float %}
    {% set y = params.Y|float %}
    {% set wells = params.WELLS|default(24)|int %}
    {% set orient = params.ORIENT|default("H")|upper %}
    {% set vol = params.VOLUME|default(1)|float %}
    {% set sp = params.SPEED|default(100)|float %}
    {% set zd = params.Z_DISP|default(70)|float %}
    {% set zt = params.Z_TRAVEL|default(5)|float %}
    {% set rev = params.REVERSE|default(50)|float %}
    {% set dly = params.DELAY|default(1000)|int %}
    {% if wells == 6 %}    {% set wH = 3 %}{% set wV = 2 %}{% set rowSp = 39.12 %}
    {% elif wells == 12 %} {% set wH = 4 %}{% set wV = 3 %}{% set rowSp = 26.00 %}
    {% elif wells == 24 %} {% set wH = 6 %}{% set wV = 4 %}{% set rowSp = 19.30 %}
    {% elif wells == 96 %} {% set wH = 12 %}{% set wV = 8 %}{% set rowSp = 9.00 %}
    {% else %}
        {action_raise_error("WELLS must be 6, 12, 24, or 96")}
    {% endif %}
    {% set rows = wV if orient == "H" else wH %}
    {% set a2x = x + 14.38 + rowSp %}
    {% set a2y = y + 11.24 %}
    G90
    G1 Z{zt} F600
    setSpacing PLATE={wells}
    G1 X{a2x} Y{a2y} F6000
    G1 Z{zd} F600
    {% for r in range(rows) %}
        fillRow X={a2x} Y={a2y + r * rowSp} WELLS={wells} ORIENT={orient} VOLUME={vol} SPEED={sp} SKIP_Z=1 REVERSE={rev} DELAY={dly}
    {% endfor %}
    G1 Z{zt} F600
    setSpacing TARGET=0